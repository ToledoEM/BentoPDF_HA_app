pid /tmp/nginx/tmp/nginx.pid;
error_log /tmp/nginx/logs/error.log warn;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/nginx/tmp/client_body;
    proxy_temp_path       /tmp/nginx/tmp/proxy;
    fastcgi_temp_path     /tmp/nginx/tmp/fastcgi;
    uwsgi_temp_path       /tmp/nginx/tmp/uwsgi;
    scgi_temp_path        /tmp/nginx/tmp/scgi;

    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }
    default_type application/octet-stream;

    gzip_static on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 9;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/wasm application/x-javascript text/x-component;

    # Ingress server — only accepts connections from the HA Supervisor proxy
    server {
        listen 8099;
        server_name localhost;

        allow 172.30.32.2;
        deny all;

        root /usr/share/nginx/html;
        index index.html;
        absolute_redirect off;

        include /etc/nginx/snippets/bentopdf-locations.conf;
    }

    # Direct access server — open to all on the mapped host port
    server {
        listen 8080;
        listen [::]:8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;
        absolute_redirect off;

        include /etc/nginx/snippets/bentopdf-locations.conf;
    }
}
